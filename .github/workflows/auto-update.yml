name: Auto Update Flight Data

on:
  schedule:
    # UTC 04:00 (Taipei Time 12:00) from the 25th to the 31st of every month
    - cron: '0 4 25-31 * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  check-weekday:
    runs-on: ubuntu-latest
    outputs:
      is_weekday: ${{ steps.check.outputs.is_weekday }}
    steps:
      - name: Check if today is a weekday
        id: check
        run: |
          day_of_week=$(date +%u)
          if [ $day_of_week -le 5 ]; then
            echo "is_weekday=true" >> $GITHUB_OUTPUT
            echo "Today is a weekday (Day $day_of_week)."
          else
            echo "is_weekday=false" >> $GITHUB_OUTPUT
            echo "Today is a weekend (Day $day_of_week)."
          fi

  update-data:
    needs: check-weekday
    if: needs.check-weekday.outputs.is_weekday == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Install Node.js dependencies
        run: npm ci || npm install

      - name: Run Crawler
        run: python parse_and_download.py

      - name: Check for new files
        id: check-changes
        run: |
          git_status=$(git status --porcelain extracted/)
          if [ -z "$git_status" ]; then
            echo "New data has not been published yet. Skipping pipeline."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "New data files found!"
            echo "$git_status"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Process raw XLS data
        if: steps.check-changes.outputs.has_changes == 'true'
        run: node process_data.js

      - name: Pre-render static pages (SSG)
        if: steps.check-changes.outputs.has_changes == 'true'
        run: npm run build

      - name: Create Pull Request with update for review
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Create and switch to preview branch
          git checkout -b data-update-preview
          
          # Only commit raw data, processed JSON data, and the market outlook report
          git add extracted/ data/ insights/2026-taiwan-aviation-market-outlook/index.html
          git commit -m "feat(data): auto update flight data and market outlook report"
          
          # Force push to the preview branch
          git push origin data-update-preview --force
          
          # Create a Pull Request (using GitHub CLI) if it doesn't already exist
          gh pr create \
            --title "📊 航空市場載客率數據與分析報告自動更新審查" \
            --body "### 報告自動更新完成
            爬蟲已成功抓取最新月份數據並重新渲染分析報告。
            
            **請至下方 Vercel Bot 產出的 Preview URL 進行網頁樣式與數據審查。**
            審查無誤後，請直接 Merge 此 Pull Request。這將會把數據合併入 \`main\` 分支並發布至正式生產環境。" \
            --head data-update-preview \
            --base main || echo "PR already exists."
