<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style B - Neon Cyber</title>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,600,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --text-primary: #FFFFFF;
            --text-secondary: #8892B0;
            --accent-cyan: #00F0FF;
            --accent-magenta: #FF003C;

            --font-body: 'General Sans', sans-serif;
            --font-mono: monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;

            /* Cyber grid background */
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .slide {
            padding: 4rem;
            width: 100%;
            max-width: 1000px;
            position: relative;
            text-align: center;
        }

        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        h1 {
            font-size: clamp(3rem, 7vw, 6rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            position: relative;
            color: var(--text-primary);
            opacity: 0;
            transform: scale(0.95);
            animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
        }

        h1::before,
        h1::after {
            content: "YOY ANALYSIS";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            opacity: 0;
        }

        h1::before {
            left: 3px;
            text-shadow: -2px 0 var(--accent-magenta);
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }

        h1::after {
            left: -3px;
            text-shadow: -2px 0 var(--accent-cyan);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        h1:hover::before,
        h1:hover::after {
            opacity: 1;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 4rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slide-up 0.6s ease-out 0.6s forwards;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-mono {
            font-family: var(--font-mono);
            color: var(--accent-cyan);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
        }

        @keyframes pop-in {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slide-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
            }

            20% {
                clip-path: inset(60% 0 10% 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
            }

            80% {
                clip-path: inset(10% 0 70% 0);
            }

            100% {
                clip-path: inset(30% 0 20% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
            }

            20% {
                clip-path: inset(30% 0 20% 0);
            }

            40% {
                clip-path: inset(70% 0 10% 0);
            }

            60% {
                clip-path: inset(20% 0 50% 0);
            }

            80% {
                clip-path: inset(50% 0 30% 0);
            }

            100% {
                clip-path: inset(5% 0 80% 0);
            }
        }
    </style>
</head>

<body>
    <section class="slide">
        <div class="stat-mono reveal"
            style="animation-delay: 0.1s; margin-bottom: 1rem; opacity:0; animation: pop-in 0.3s forwards;">[
            SYS.DATA.INIT ]</div>
        <div class="glitch-wrapper">
            <h1>YOY ANALYSIS<br><span style="color:var(--accent-cyan);">2024-2025</span></h1>
        </div>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-mono">5</span>
                <span class="stat-label">Top Airlines</span>
            </div>
            <div class="stat-item">
                <span class="stat-mono">+25.4%</span>
                <span class="stat-label">Volume Growth</span>
            </div>
        </div>
    </section>
</body>

</html>
