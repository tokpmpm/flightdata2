<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style C - Swiss Minimal</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #F4F4F5;
            --text-primary: #18181B;
            --accent: #DC2626;
            --font-main: 'Cabinet Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100vh;
        }

        .grid-container {
            width: 100%;
            height: 100%;
            padding: 4rem;
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 1fr auto;
            gap: 2rem;
        }

        .header {
            grid-column: 2;
            align-self: end;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--text-primary);
        }

        h1 {
            font-size: clamp(4rem, 8vw, 8rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.03em;
            transform: translateY(100px);
            opacity: 0;
            animation: slide-up 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .red-dot {
            color: var(--accent);
            display: inline-block;
            transform: scale(0);
            animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
        }

        .sidebar {
            grid-column: 1;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 1.25rem;
            font-weight: 400;
            opacity: 0;
            animation: fade-in 1.5s ease 0.5s forwards;
        }

        .meta-data p {
            margin-bottom: 0.5rem;
            opacity: 0.6;
        }

        @keyframes slide-up {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fade-in {
            to {
                opacity: 1;
            }
        }

        @keyframes pop {
            to {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="sidebar">
            <div class="logo">
                <strong>Analysis</strong> Report
            </div>
            <div class="meta-data">
                <p>2024</p>
                <p>&mdash;</p>
                <p>2025</p>
            </div>
        </div>
        <div class="header">
            <h1>Capacity<br>Growth<span class="red-dot">.</span></h1>
        </div>
    </div>
</body>

</html>
